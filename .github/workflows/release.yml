name: Release

# Triggered by a version tag push: git tag v0.5.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub release

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── macOS arm64 ──────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build .app bundle
        run: ./scripts/build-macos-app.sh --release

      - name: Zip .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist/macos
          zip -r "../../Glanvu-${VERSION}-macos-arm64.zip" Glanvu.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: Glanvu-*.zip

  # ── Linux x86_64 ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev \
            pkg-config dpkg

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package (.tar.gz + .deb)
        run: ./scripts/build-linux-pkg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/linux/

  # ── Windows x86_64 ───────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package (.zip)
        run: ./scripts/build-windows-pkg.sh
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/windows/*.zip

  # ── Create GitHub release ────────────────────────────────────────────────────
  release:
    name: Create release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the block between the current version header and the next one
          BODY=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md \
                 | grep -v "^## \[" | sed '/^$/d;/^\[/d')
          {
            echo 'body<<EOF'
            echo "$BODY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Glanvu ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.deb
