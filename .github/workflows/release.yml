name: Release

# Triggered by a version tag push: git tag vX.Y.Z && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub release

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # PDFium (D13 in the decision log): Glanvu's first native runtime dependency. Pin an exact
  # bblanchon/pdfium-binaries release tag here — never "latest" — that repo rolls with every
  # Chromium roll (often weekly), so floating would make PDF support silently vary release to
  # release with no way to bisect a regression. Bump deliberately. The tag itself contains a
  # literal "/" (Chromium's own versioning scheme), so it must stay %2F-encoded wherever it's
  # used as a URL path segment below.
  PDFIUM_VERSION: chromium%2F7920

jobs:
  # ── macOS arm64 + x86_64 ─────────────────────────────────────────────────────
  build-macos:
    name: macOS (arm64 + x86_64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Fetch PDFium (arm64)
        run: |
          curl -fL -o pdfium-mac-arm64.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_VERSION}/pdfium-mac-arm64.tgz"
          mkdir -p vendor/pdfium-mac-arm64
          tar -xzf pdfium-mac-arm64.tgz -C vendor/pdfium-mac-arm64

      - name: Build arm64 .app bundle
        run: ./scripts/build-macos-app.sh --release
        env:
          GLANVU_PDFIUM_DIST_DIR: ${{ github.workspace }}/vendor/pdfium-mac-arm64

      - name: Zip arm64 .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist/macos
          zip -r "../../Glanvu-${VERSION}-macos-arm64.zip" Glanvu.app

      - name: Fetch PDFium (x86_64)
        run: |
          curl -fL -o pdfium-mac-x64.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_VERSION}/pdfium-mac-x64.tgz"
          mkdir -p vendor/pdfium-mac-x64
          tar -xzf pdfium-mac-x64.tgz -C vendor/pdfium-mac-x64

      - name: Build x86_64 .app bundle
        run: ./scripts/build-macos-app.sh --release --target x86_64-apple-darwin
        env:
          GLANVU_PDFIUM_DIST_DIR: ${{ github.workspace }}/vendor/pdfium-mac-x64

      - name: Zip x86_64 .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist/macos
          zip -r "../../Glanvu-${VERSION}-macos-x86_64.zip" Glanvu.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: Glanvu-*.zip

  # ── Linux x86_64 ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev \
            pkg-config dpkg

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Fetch PDFium (x86_64)
        run: |
          curl -fL -o pdfium-linux-x64.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_VERSION}/pdfium-linux-x64.tgz"
          mkdir -p vendor/pdfium-linux-x64
          tar -xzf pdfium-linux-x64.tgz -C vendor/pdfium-linux-x64

      - name: Build release binary
        run: cargo build --release

      - name: Package (.tar.gz + .deb)
        run: ./scripts/build-linux-pkg.sh
        env:
          GLANVU_PDFIUM_DIST_DIR: ${{ github.workspace }}/vendor/pdfium-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/linux/

  # ── Windows x86_64 ───────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Fetch PDFium (x86_64)
        shell: bash
        run: |
          curl -fL -o pdfium-win-x64.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_VERSION}/pdfium-win-x64.tgz"
          mkdir -p vendor/pdfium-win-x64
          tar -xzf pdfium-win-x64.tgz -C vendor/pdfium-win-x64

      - name: Build release binary
        run: cargo build --release

      - name: Package (.zip)
        run: ./scripts/build-windows-pkg.sh
        shell: bash
        env:
          GLANVU_PDFIUM_DIST_DIR: ${{ github.workspace }}/vendor/pdfium-win-x64

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/windows/*.zip

  # ── Create GitHub release ────────────────────────────────────────────────────
  release:
    name: Create release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the block between the current version header and the next one
          BODY=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md \
                 | grep -v "^## \[" | sed '/^$/d;/^\[/d')
          {
            echo 'body<<EOF'
            echo "$BODY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Glanvu ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.deb

  # After the draft release has its assets, update all packaging manifests (sha256
  # digests + version strings + download links) and commit them to main so that
  # publish-distributions.yml can read up-to-date files from main once the draft
  # is published (the deliberate human gate).
  bump-manifests:
    name: Bump packaging manifests
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bump-packaging.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/bump-packaging.sh "$VERSION"

      - name: Commit manifests to main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ web/index.html README.md
          if git diff --cached --quiet; then
            echo "Nothing to commit — manifests already at ${VERSION}."
          else
            # No `[skip ci]`: none of our workflows trigger on push to main (release.yml is
            # tag-only), so it protects nothing here — and this exact commit is the one that
            # bumps web/index.html, which Cloudflare Pages' git integration also treats `[skip
            # ci]` as a signal to skip deploying. Confold's version of this job carries the
            # marker for its own repo's needs; don't copy it blindly here.
            git commit -m "chore: packaging manifests v${VERSION}"
            git push origin main
          fi
