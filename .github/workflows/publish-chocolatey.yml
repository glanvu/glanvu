name: Publish Chocolatey

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 0.5.0)"
        required: true
        default: "0.5.0"

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack and push
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        shell: pwsh
        run: |
          cd dist/chocolatey
          choco pack
          choco push glanvu.${{ github.event.inputs.version }}.nupkg `
            --source https://push.chocolatey.org/ `
            --api-key $env:CHOCO_API_KEY
